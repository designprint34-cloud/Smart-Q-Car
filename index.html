<!DOCTYPE html>
<html lang="ar">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart QR Car</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f0f0f, #2c2c2c);
  color: white;
  text-align: center;
}

/* لودينغ */
.loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
}

.spinner {
  border: 5px solid #333;
  border-top: 5px solid #25D366;
  border-radius: 50%;
  width: 50px;
  height: 50px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

/* كرت */
.card {
  display: none;
  margin-top: 80px;
  background: #1f1f1f;
  border-radius: 20px;
  padding: 30px;
  width: 85%;
  max-width: 350px;
  margin-left: auto;
  margin-right: auto;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* لوجو */
.logo {
  font-size: 14px;
  opacity: 0.7;
  margin-bottom: 10px;
}

  <div class="logo">Smart QR Car</div>
}
  
/* اسم */
#name {
  font-size: 24px;
  margin-bottom: 20px;
}

/* أزرار */
.btn {
  display: block;
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

.whatsapp {
  background: #25D366;
  color: white;
}

.call {
  background: #007BFF;
  color: white;
}

/* حماية بسيطة */
body {
  -webkit-user-select: none;
  user-select: none;
}
</style>
</head>

<body oncontextmenu="return false">

<div class="loader" id="loader">
  <div class="spinner"></div>
</div>

<div class="card" id="card">

  <div class="logo">Smart QR Car</div>

  <h2 id="name">...</h2>

  <a id="whatsapp" target="_blank">
    <button class="btn whatsapp">📲 WhatsApp</button>
  </a>

  <a id="call">
    <button class="btn call">📞 Call</button>
  </a>

</div>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQFS2UTok3vPtOJvoo0OQ2BhRf_OJ_7pLHNcMvvzyfF3GjSajmavnyR9yxqVFHuLZdBz6z-lejcyJcM/pub?output=csv"
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

fetch(sheetURL)
.then(res => res.text())
.then(csv => {

  const rows = csv.split("\n").slice(1);
  let found = false;

  rows.forEach(row => {
    const cols = row.split(",").map(c => c.trim());

    if(cols[0].trim() === id.trim()){

      found = true;

      const name = cols[1];
      const phone = cols[2];
      const active = cols[3];

      if(active !== "YES"){
        document.body.innerHTML = "<h2>❌ غير مفعل</h2>";
        return;
      }

      document.getElementById("name").innerText = name;

      document.getElementById("whatsapp").href =
        let fixedPhone = phone.replace(/^0/, "962");
document.getElementById("whatsapp").href =
"https://wa.me/" + fixedPhone;

      document.getElementById("call").href =
        "tel:" + phone;

      // 📊 تتبع الضغطات (بسيط)
      fetch("https://api.countapi.xyz/hit/smartqcar/" + id);

    }

  });

  if(!found){
    document.body.innerHTML = "<h2>❌ غير موجود</h2>";
    return;
  }

  // إخفاء اللودينغ وإظهار الكرت
  document.getElementById("loader").style.display = "none";
  document.getElementById("card").style.display = "block";

});

</script>

</body>
</html>
