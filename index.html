<!DOCTYPE html>
<html lang="ar">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart QR Contact</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #1f1f1f, #3a3a3a);
  color: white;
  text-align: center;
}

/* كرت رئيسي */
.card {
  margin-top: 80px;
  background: #2b2b2b;
  border-radius: 20px;
  padding: 30px;
  width: 85%;
  max-width: 350px;
  margin-left: auto;
  margin-right: auto;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* صورة */
.avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: #444;
  margin: auto;
  margin-bottom: 15px;
}

/* الاسم */
#name {
  font-size: 24px;
  margin-bottom: 20px;
}

/* أزرار */
.btn {
  display: block;
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

/* واتساب */
.whatsapp {
  background: #25D366;
  color: white;
}

/* اتصال */
.call {
  background: #007BFF;
  color: white;
}

/* موقع */
.map {
  background: #ff9800;
  color: white;
}

.footer {
  margin-top: 15px;
  font-size: 12px;
  opacity: 0.6;
}
</style>

</head>

<body>

<div class="card">
  
  <div class="avatar"></div>

  <h2 id="name">Loading...</h2>

  <a id="whatsapp" target="_blank">
    <button class="btn whatsapp">WhatsApp</button>
  </a>

  <a id="call">
    <button class="btn call">Call</button>
  </a>

  <a id="map" target="_blank">
    <button class="btn map">Location</button>
  </a>

  <div class="footer">Smart QR Car</div>

</div>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQFS2UTok3vPtOJvoo0OQ2BhRf_OJ_7pLHNcMvvzyfF3GjSajmavnyR9yxqVFHuLZdBz6z-lejcyJcM/pub?output=csv"

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

fetch(sheetURL)
.then(res => res.text())
.then(csv => {

  const rows = csv.split("\n").slice(1);

  let found = false;

  rows.forEach(row => {
    const cols = row.split(",");

    if(cols[0] == id){

      found = true;

      const name = cols[1];
      const phone = cols[2];
      const active = cols[3];

      if(active !== "YES"){
        document.body.innerHTML = "<h2>❌ غير مفعل</h2>";
        return;
      }

      document.getElementById("name").innerText = name;

      document.getElementById("whatsapp").href =
        "https://wa.me/962" + phone;

      document.getElementById("call").href =
        "tel:" + phone;

      document.getElementById("map").href =
        "https://www.google.com/maps";

    }

  });

  if(!found){
    document.body.innerHTML = "<h2>❌ غير موجود</h2>";
  }

});

</script>

</body>
</html>
